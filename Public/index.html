<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Materials IIT-JEE Physics</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff, #dce8ff);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #loginCard {
      background: #ffffff;
      padding: 30px 25px 35px 25px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      border: 1px solid #c7d6ff;
    }

    #loginCard img {
      width: 95px;
      margin-bottom: 15px;
    }

    #loginCard h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #003c8f;
      font-weight: 700;
    }

    #loginCard input {
      width: 100%;
      padding: 12px;
      border: 2px solid #003c8f;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
    }

    #loginCard button {
      width: 100%;
      padding: 12px;
      background: #003c8f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }

    #appContainer {
      display: none;
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
	
	










.register-btn{
  display:inline-block;
  padding:10px 16px;
  background:linear-gradient(135deg, #ff9800, #f57c00);
  color:white;
  border-radius:8px;
  font-size:13px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  transition:0.3s;
}

.register-btn:hover{
  background:linear-gradient(135deg, #ffa726, #ef6c00);
  transform:translateY(-2px);
  box-shadow:0 6px 12px rgba(0,0,0,0.3);
}


	
	
	
.expiry-modal{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeIn 0.4s ease;
}

.expiry-box{
  width:320px;
  max-width:90%;
  background:linear-gradient(160deg,#ffffff,#e0f2f1);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
  text-align:center;
  padding:25px 20px;
  animation:popupScale 0.4s ease;
}

.expiry-icon{
  font-size:42px;
  margin-bottom:8px;
}

.expiry-box h2{
  margin:8px 0;
  color:#c62828;
  font-size:22px;
}

.expiry-box p{
  font-size:14px;
  color:#333;
  margin:14px 0 20px;
  line-height:1.5;
}

.expiry-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.renew-btn{
  text-decoration:none;
  background:linear-gradient(135deg,#ff9800,#f57c00);
  color:white;
  padding:10px 16px;
  border-radius:8px;
  font-size:13px;
  font-weight:bold;
  box-shadow:0 4px 8px rgba(0,0,0,0.25);
}

.later-btn{
  background:linear-gradient(135deg,#009688,#00796B);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  box-shadow:0 4px 8px rgba(0,0,0,0.25);
}

@keyframes fadeIn{
 from{opacity:0;}
 to{opacity:1;}
}

@keyframes popupScale{
 from{transform:scale(0.7);}
 to{transform:scale(1);}
}	
	
	
	
	
	
	
	
  </style>
</head>
<div id="expiryModal" class="expiry-modal">
  <div class="expiry-box">
    <div class="expiry-icon">⚠️</div>
    <h2>Access Expiry Warning</h2>
    <p id="expiryText">Your access will expire soon.</p>
    
    <div class="expiry-buttons">
      <a href="https://gten-educational-platform.github.io/Class-12/email.html" target="_blank" class="renew-btn">Renew Access</a>
      <button onclick="closeExpiryModal()" class="later-btn">Later</button>
    </div>
  </div>
</div>
<body>

  <div id="loginContainer">
    <div id="loginCard">

      <img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png" alt="Logo">

      <h2>Login to Study Materials<br>IIT-JEE Physics</h2>

      <input type="email" id="emailInput" placeholder="Enter your email" required />
	  
	  
	  
	  
	  
	  
	  
	  
	  
	  
	    <p id="loginError" style="color:red; font-size:13px; margin-top:5px;"></p>
		
		
		
		
		
		
		
		
		
		
		
		
		

      <button onclick="login()">Login</button>
    </div>
  </div>

  <div id="appContainer">
    <iframe id="viewer"></iframe>
  </div>

 <script>
const BACKEND_URL = "https://backend-expire-in-365.onrender.com";

const SINGLE_LINK =
"https://smiitjeephysics-glitch.github.io/SM-IIT-JEE-PHYSICS-store-and-theory/HTML theory/SM 12 physics-2026.html";



function showExpiryPopup(expiryDateString){
  const d = new Date(expiryDateString);

  const formattedDate =
    String(d.getDate()).padStart(2,'0') + "/" +
    String(d.getMonth()+1).padStart(2,'0') + "/" +
    d.getFullYear();

  setTimeout(() => {
    showExpiryModal(formattedDate);
  }, 800);
}



async function login() {
  const email = document.getElementById("emailInput").value.trim().toLowerCase();
  const errorBox = document.getElementById("loginError");

  if (!email || !email.includes("@")) {
    errorBox.innerHTML = `
      Your E-mail ID not found. Click ‘Register’ to generate your login access code (looks like an e-mail).<br><br>
      <a href="https://gten-educational-platform.github.io/Class-12/email.html" target="_blank" class="register-btn">
        Register Now
      </a>
    `;
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    // expired account
    if (data.expired === true) {
      errorBox.innerHTML = `
        Your access has expired.<br>
        Please register again to renew access.<br><br>
        <a href="https://gten-educational-platform.github.io/Class-12/email.html" target="_blank" class="register-btn">
          Renew Access
        </a>
      `;
      return;
    }

    // valid login
    if (data.token) {
      localStorage.setItem("studentEmail", email);
      localStorage.setItem("sessionToken", data.token);

      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("appContainer").style.display = "block";
      document.getElementById("viewer").src = SINGLE_LINK;

      if (data.expiringSoon) {
        showExpiryPopup(data.expiryDate);
      }

      return;
    }

    // not registered
    errorBox.innerHTML = `
      Your E-mail ID not found. Click ‘Register’ to generate your login access code (looks like an e-mail).<br><br>
      <a href="https://gten-educational-platform.github.io/Class-12/email.html" target="_blank" class="register-btn">
        Register Now
      </a>
    `;

  } catch (err) {
    errorBox.innerText = "Server error. Try later.";
  }
}


document.getElementById("emailInput").addEventListener("input", function() {
  document.getElementById("loginError").innerHTML = "";
});




// auto session restore
window.onload = async function() {
  const email = localStorage.getItem("studentEmail");
  const token = localStorage.getItem("sessionToken");

  if (!email || !token) return;

  const res = await fetch(`${BACKEND_URL}/validate`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, token })
  });

  const data = await res.json();

  if (data.expired) {
    alert("Your access has expired. Please renew.");
    localStorage.clear();
    return;
  }

  if (data.valid) {
    document.getElementById("loginContainer").style.display = "none";
    document.getElementById("appContainer").style.display = "block";
    document.getElementById("viewer").src = SINGLE_LINK;

    if (data.expiringSoon) {
      showExpiryPopup(data.expiryDate);
    }

  } else {
    localStorage.clear();
  }
};




// auto logout if another device logs in
setInterval(async () => {
  const email = localStorage.getItem("studentEmail");
  const token = localStorage.getItem("sessionToken");

  if (!email || !token) return;

  const res = await fetch(`${BACKEND_URL}/validate`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, token })
  });

  const data = await res.json();

  if (data.expired) {
    alert("Your access has expired. Please renew.");
    localStorage.clear();
    location.reload();
    return;
  }

  // 🔐 HANDLE OTHER DEVICE LOGIN
  if (!data.valid) {
    alert("⚠️ You have been logged out because this account was opened on another device.");
    localStorage.clear();
    location.reload();
  }
}, 5000);




function showExpiryModal(formattedDate){
  document.getElementById("expiryText").innerHTML =
    `Your access will expire on <b>${formattedDate}</b>.<br>Please renew now to avoid interruption.`;
    
  document.getElementById("expiryModal").style.display = "flex";
}

function closeExpiryModal(){
  document.getElementById("expiryModal").style.display = "none";
}

</script>

</body>
</html>
